name: Test Mod Build (Pull Request)

on: pull_request

# Superseded runs on the same PR are pointless — the server smoke test is slow.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # RFG runs the Gradle process on Java 21+ (compiler + mod code stay Java 8 via
      # Jabel); older Gradle-JVM Java versions are deprecated and slated for removal.
      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Assemble mod with Gradle
        run: ./gradlew build -Dhttp.socketTimeout=60000 -Dhttp.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000 -Dorg.gradle.internal.http.connectionTimeout=60000

      - name: Upload unit test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: build/reports/tests/test/
          retention-days: 7

  server_smoke_test:
    name: Dedicated Server Smoke Test
    needs: compile
    runs-on: ubuntu-latest
    # World gen on a cold cache is the slow part; the script has its own inner budget.
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # `./gradlew build` passing proves nothing about whether the mod can LOAD on a
      # dedicated server: client-only classes reached from common code, a client mod
      # declared as a hard dependency, or a Side.CLIENT handler touching Minecraft
      # directly all compile cleanly and only fail at server startup.
      # LDIB is exposed here — the bike entity renderer, model and (later) camera lean are
      # all client-only and sit next to the common EntityBike that a server must load.
      - name: Boot dedicated server and assert startup
        run: bash .github/scripts/server-smoke-test.sh
        env:
          SMOKE_TIMEOUT: '900'

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-smoke-log
          path: server-smoke.log
          retention-days: 7
